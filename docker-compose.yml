version: "3.9"

services:
  moso-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MOSO_ENV=production
      - DATABASE_URL=postgresql://moso:changeme@postgres:5432/moso
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - moso_data:/data
      - ./models:/models:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moso
      POSTGRES_USER: moso
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma-data
    volumes:
      - chroma_data:/chroma-data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  moso_data:
