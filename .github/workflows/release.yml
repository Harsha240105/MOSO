name: Release — Semantic Versioning

on:
  push:
    branches: [main]

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Extract latest tag or default to v0.1.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Current tag: $LATEST_TAG"

      - name: Generate release notes
        id: notes
        run: |
          echo "## MOSO AI Release ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### What's New" >> release-notes.md
          git log --oneline --no-decorate ${{ steps.version.outputs.latest_tag }}..HEAD --pretty=format:"- %s" >> release-notes.md || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
