name: PR Gate — Required Checks

on:
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python lint
        run: |
          pip install flake8 black
          flake8 backend/ moso-core/ moso-memory-engine/ shared/ scripts/ --max-line-length=100
          black --check --line-length=100 backend/ moso-core/ moso-memory-engine/ shared/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: |
          pip install pytest
          pytest tests/unit/ --junitxml=test-results.xml || echo "No unit tests yet"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check MOSO Source Available License
        run: |
          if [ ! -f LICENSE ]; then
            echo "ERROR: LICENSE file is missing"
            exit 1
          fi
          if ! grep -q "MOSO Source Available License" LICENSE; then
            echo "ERROR: LICENSE must be MOSO Source Available License"
            exit 1
          fi
          echo "License check passed"

  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if ! echo "$TITLE" | grep -qE '^(feat|fix|docs|refactor|test|chore|perf|security)\([a-z-]+\): '; then
            echo "ERROR: PR title must follow Conventional Commits format"
            echo "Expected: type(scope): description"
            echo "Got: $TITLE"
            exit 1
          fi
          echo "PR title format valid"
