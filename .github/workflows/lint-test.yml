name: Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16"

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Python lint
        run: |
          pip install flake8 black isort
          flake8 backend/ moso-core/ moso-memory-engine/ shared/ scripts/
          black --check backend/ moso-core/ moso-memory-engine/ shared/ scripts/
          isort --check-only backend/ moso-core/ moso-memory-engine/ shared/ scripts/

      - name: Flutter analyze
        run: |
          cd apps/android
          flutter analyze

      - name: Rust lint
        run: |
          cd moso-core
          cargo clippy -- -D warnings
          cargo fmt --check
