name: Discord Notification

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: >
            **[{{ EVENT_PAYLOAD.repository.full_name }}]** Push by
            {{ EVENT_PAYLOAD.pusher.name }} on `{{ EVENT_PAYLOAD.ref }}`
            > {{ EVENT_PAYLOAD.commits[0].message }}
