name: iOS Build

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/ios/**"
      - "shared/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ios/**"
      - "shared/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/ios

      - name: Build iOS
        run: |
          xcodebuild -workspace MOSOApp.xcworkspace \
            -scheme MOSOApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
