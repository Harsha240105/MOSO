name: Branch Protection Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, dev, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify PR targets protected branch
        run: |
          if [[ "${{ github.base_ref }}" == "main" || "${{ github.base_ref }}" == "dev" || "${{ github.base_ref }}" == "staging" ]]; then
            echo "PR targets protected branch: ${{ github.base_ref }}"
          else
            echo "PR targets non-protected branch: ${{ github.base_ref }}"
          fi

      - name: Check for signed commits
        uses: 1Password/check-signed-commits-action@v1

      - name: Require conventional commit format
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .github/commitlint.config.js
